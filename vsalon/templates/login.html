{% extends "base.html" %}
{% block title %}Log In{% endblock %}
{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <a href="{{ url_for('home') }}" class="navbar-brand" style="justify-content:center;margin-bottom:1.5rem">V<span>Salon</span></a>
        <h2>Welcome Back</h2>
        <p class="subtitle">Log in to manage your appointments</p>
        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">Log In</button>
        </form>
        <p class="text-center mt-2" style="font-size:0.9rem;color:var(--text-light)">
            Don't have an account? <a href="{{ url_for('register') }}">Sign up</a>
        </p>
    </div>
</div>
{% endblock %}

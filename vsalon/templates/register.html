{% extends "base.html" %}
{% block title %}Sign Up{% endblock %}
{% block navbar %}{% endblock %}
{% block footer %}{% endblock %}
{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <a href="{{ url_for('home') }}" class="navbar-brand" style="justify-content:center;margin-bottom:1.5rem">V<span>Salon</span></a>
        <h2>Create Account</h2>
        <p class="subtitle">Join VSalon and book your first appointment</p>
        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="full_name" class="form-control" placeholder="Juan Dela Cruz" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="form-group">
                <label>Phone Number</label>
                <input type="tel" name="phone" class="form-control" placeholder="09XXXXXXXXX">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" class="form-control" placeholder="At least 6 characters" required minlength="6">
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm_password" class="form-control" placeholder="Re-enter password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center">Create Account</button>
        </form>
        <p class="text-center mt-2" style="font-size:0.9rem;color:var(--text-light)">
            Already have an account? <a href="{{ url_for('login') }}">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
